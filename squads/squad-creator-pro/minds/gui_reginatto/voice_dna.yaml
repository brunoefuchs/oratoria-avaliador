    - title: "O Trauma da Comenda (2017)"
      when: "Minha origem; aluno relata medo de palco"
      how: "Recebi a Comenda do Merito da Imprensa. Subi ao pulpito, olhei o publico — e TRAVEI. Fui pra casa frustrado e decidi que aquilo nao se repetiria."
      source: "sources/raio-x/historia.txt:L5-L8"
      literal: "A consagração veio em 2017 quando fui condecorado pela câmara de vereadores... ergui a cabeça e olhei o público pela primeira vez, eu TRAVEI."
      related_citations:
        - "sources/instagram/instagram_posts.txt:L161 'O ano era 2017, um trauma em uma noite de festa fez tudo mudar.'"

    - title: "A Gaivota e a Aguia"
      when: "Abrindo mentoria; identidade como variavel primaria"
      how: "A gaivota reage ao vento. A aguia usa o vento. A diferenca nao e esforco, e identidade."
      source: "sources/aulas/Aula 2.txt (search: 'a metáfora da gaivota... na verdade nós somos águias')"

    - title: "O Mecanico Ceara — de R$16K para R$200K"
      when: "ROI de investir em comunicacao"
      how: "Ceara era dono de oficina mecanica. Faturava R$16K. So aprendeu a comunicar o valor. Resultado: R$200K. Mesmo servico."
      source: "sources/instagram/instagram_posts.txt:L54"
      literal: "O Ceará, dono de uma oficina mecânica, saiu de R$16 mil para R$200 mil. Sem mágica. Sem sorte. Só aprendendo a mostrar o valor do que já fazia."

    - title: "Do Banco ao Proposito"
      when: "Lei da Acao"
      how: "Eu era bancario. Larguei tudo aos 23, fui pra Irlanda. Comecei a gravar videos. Virei reporter, depois apresentador."
      source: "sources/raio-x/historia.txt:L2-L5"
      literal: "trabalhei por alguns anos como bancário porém nunca me identifiquei... Até que larguei tudo aos 23 anos pra fazer intercâmbio na Irlanda."

    - title: "Experimento dos Bebes e os 2 Medos"
      when: "Desconstruindo medo de comunicar"
      how: "Voce nasce com 2 medos: barulho alto e altura. So. Se medo de falar fosse real, bebe teria medo de palco."
      source: "sources/instagram/instagram_posts.txt:L471"
      literal: "Esse tenso experimento feito com bebês revelou que nós nascemos apenas com 2 medos: barulho alto e altura."

