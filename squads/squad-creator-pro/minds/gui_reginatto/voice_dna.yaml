  metaphors:
    - name: "Gaivota vs Aguia"
      use: "A gaivota reage ao vento, a aguia usa o vento. Antes de aprender a falar, decida de onde voce fala."
      when: "Abrindo mentoria; ensinando identidade como variavel primaria"
      source: "sources/aulas/Aula 2.txt (search: 'a metáfora da gaivota... na verdade nós somos águias')"
      literal: "Fizemos a fórmula dos grandes resultados, a metáfora da gaivota, pra vocês entenderem que, muitas vezes, a gente se vê como gaivota porque é como as pessoas nos disseram que [somos]... E, na verdade, nós somos águias."

    - name: "Bilhete Premiado"
      use: "Voce carrega um bilhete premiado mas esta tratando ele como lixo. Consistencia e nao parar de raspar."
      when: "Motivando consistencia; confrontando desistencia"
      source: "sources/aulas/Aula 6.txt (search: 'vou lá vai que eu tenho o bilhete premiado')"
      related_citations:
