# AGENTS (Epic 1 delivery: só orchestrator)
# ═══════════════════════════════════════════════════════════════════════════════
agents:
  - id: oratoria-avaliador-chief
    executor_profile:
      sinkra_type: Agent
      human_in_the_loop: true
      output_schema: "quality_gate_decision.json"
      story_role: executor
      can_execute: true
      work_contexts: ["general"]
      can_review: ["evaluation_pipeline_output"]
    name: "Oratória Avaliador Chief"
    role: "Orquestrador do pipeline — roteia fases e aplica gate"
    tier: orchestrator
    is_orchestrator: true
    epic_source: 1

  # ─── Epic 2: Scoring + Congruence ───
  - id: scoring-engine
    name: "Scoring Engine"
    role: "Aplica pesos contextuais (6.Q) e emite scores 0-100 por dimensão"
    tier: 1
    agent_type: "functional-deterministic"
    implementation: "tasks/scoring_engine.py"
    epic_source: 2

  - id: congruence-auditor
    name: "Congruence Auditor"
    role: "Detecta contradições entre dimensões — G3 gate"
    tier: 0
    agent_type: "functional-deterministic"
    implementation: "tasks/congruence_auditor.py"
    epic_source: 2

  - id: speech-prosody-expert
    name: "Speech & Prosody Expert"
    role: "Consultor de estado da arte em análise de fala (Praat, Parselmouth, Whisper, GeMAPS)"
    tier: 1
    agent_type: "technical-reference"
    epic_source: 2

  - id: face-gesture-expert
    name: "Face & Gesture Expert"
    role: "Consultor em FACS/MediaPipe/OpenFace para análise visual"
    tier: 1
    agent_type: "technical-reference"
    epic_source: 2

  - id: narrative-structure-expert
    name: "Narrative Structure Expert"
    role: "Consultor em storytelling computacional (Freytag, Harmon, Reagan arcs)"
    tier: 1
    agent_type: "technical-reference"
    epic_source: 2

