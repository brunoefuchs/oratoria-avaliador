# ═══════════════════════════════════════════════════════════════════════════════
# AGENTS (Epic 1 delivery: só orchestrator)
# ═══════════════════════════════════════════════════════════════════════════════
agents:
  - id: oratoria-avaliador-chief
    executor_profile:
      sinkra_type: Agent
      human_in_the_loop: true
      output_schema: "quality_gate_decision.json"
      story_role: executor
      can_execute: true
      work_contexts: ["general"]
      can_review: ["evaluation_pipeline_output"]
    name: "Oratória Avaliador Chief"
    role: "Orquestrador do pipeline — roteia fases e aplica gate"
    tier: orchestrator
    is_orchestrator: true
    epic_source: 1

  # ─── Epic 2: Scoring + Congruence ───
  - id: scoring-engine
    name: "Scoring Engine"
    role: "Aplica pesos contextuais (6.Q) e emite scores 0-100 por dimensão"
    tier: 1
    agent_type: "functional-deterministic"
    implementation: "tasks/scoring_engine.py"
    epic_source: 2

  - id: congruence-auditor
    name: "Congruence Auditor"
    role: "Detecta contradições entre dimensões — G3 gate"
    tier: 0
    agent_type: "functional-deterministic"
    implementation: "tasks/congruence_auditor.py"
    epic_source: 2

  - id: speech-prosody-expert
    name: "Speech & Prosody Expert"
    role: "Consultor de estado da arte em análise de fala (Praat, Parselmouth, Whisper, GeMAPS)"
    tier: 1
    agent_type: "technical-reference"
    epic_source: 2

  - id: face-gesture-expert
    name: "Face & Gesture Expert"
    role: "Consultor em FACS/MediaPipe/OpenFace para análise visual"
    tier: 1
    agent_type: "technical-reference"
    epic_source: 2

  - id: narrative-structure-expert
    name: "Narrative Structure Expert"
    role: "Consultor em storytelling computacional (Freytag, Harmon, Reagan arcs)"
    tier: 1
    agent_type: "technical-reference"
    epic_source: 2

  # ─── Epic 3: Mentor Narrative ───
  - id: mentor-router
    name: "Mentor Router"
    role: "Decide gui vs vinh baseado em language + 6.Q"
    tier: 1
    agent_type: "functional-deterministic"
    implementation: "tasks/mentor_router.py"
    epic_source: 3

  - id: hierarchy-ranker
    name: "Hierarchy Ranker"
    role: "Rankeia problemas por weighted_impact (top-N)"
    tier: 2
    agent_type: "functional-deterministic"
    implementation: "tasks/hierarchy_ranker.py"
    epic_source: 3

  - id: exercise-prescriber
    name: "Exercise Prescriber"
    role: "Linka exercício mentor-específico a cada problema — G6 gate"
    tier: 2
    agent_type: "functional-deterministic"
    implementation: "tasks/exercise_prescriber.py"
    epic_source: 3

  - id: mentor-narrator
    name: "Mentor Narrator"
    role: "Gera narrativa com Voice DNA injection (template + LLM) — G4 gate"
    tier: 1
    agent_type: "hybrid"
    implementation: "tasks/mentor_narrator.py"
    epic_source: 3

  # ─── Epic 4: Quality Gate + Calibration ───
  - id: quality-gate-keeper
    name: "Quality Gate Keeper"
    role: "Combina G1-G6 em verdict PASS/FAIL/WAIVED/INCOMPLETE — único autorizado a release"
    tier: 0
    agent_type: "functional-deterministic"
    implementation: "tasks/quality_gate_keeper.py"
    epic_source: 4

  - id: calibration-keeper
    name: "Calibration Keeper"
    role: "Append-only log de mudanças de peso/threshold — G7 gate"
    tier: 0
    agent_type: "functional-deterministic"
    implementation: "tasks/calibration_keeper.py"
    epic_source: 4

