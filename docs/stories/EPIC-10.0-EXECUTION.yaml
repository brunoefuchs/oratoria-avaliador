  - { name: "MediaPipe FaceLandmarker", critical_for: "Story 10.2", risk: "none — já no stack" }
  - { name: "Gemini API (gemini-2.5-flash)", critical_for: "Story 10.3", risk: "low — fallback gracioso definido" }
