# ISSUES IDENTIFIED
# ─────────────────────────────────────────────────────────────

issues:

  - id: C1
    severity: medium
    category: requirements
    title: "Gate 2 smoke 10 vídeos pendente"
    description: |
      Protocol draft pronto em docs/qa/gate2-story91-smoke.md, mas execução
      requer script ml_worker/scripts/replay_eval.py (~30 linhas) que não
      foi criado no escopo desta story. Gate 2 criteria ajustado pelo @po
      (delta ≤15pt + rastreabilidade + direção consistente).
    impact: |
      Baixo. Feature flag STATE_OF_ART_ENABLED default FALSE garante
      comportamento v0.6.0 bit-idêntico em prod. Merge não expõe usuário
      ao novo path. Gate 2 pode executar pós-merge em shadow mode.
    recommendation: |
      Criar story follow-up "9.1.1 — Gate 2 smoke execution" com:
      1. Implementar replay_eval.py script
      2. Selecionar 10 evals representativos (mix monotônicos/variados)
      3. Executar protocol + preencher tabela em gate2-story91-smoke.md
      4. Ativar flag em staging pós-PASS
    blocking: false

  - id: C2
    severity: medium
    category: code
    title: "aggregate_metrics_legacy inherits flag-aware _get_pesos"
    description: |
      aggregate_metrics_legacy() em aggregator.py chama _get_pesos() que agora
      é flag-aware. Quando STATE_OF_ART_ENABLED=true, legacy function usa
      PESOS_DEFAULT (6 dims novos) ao invés de PESOS_DEFAULT_V060 (5 dims pre-Epic 9).
      Contradiz parcialmente a garantia "preservado 100% intocado" da Epic 8.
    impact: |
      Muito baixo em prática. Legacy path é cold (TRUTH_CONTRACT_ENABLED=true
      default). Cenário de collision requer: legacy path ativo + flag 9.1 ON
      simultaneamente — improvável.
    recommendation: |
      Hardcodear V060 pesos dentro de aggregate_metrics_legacy OU criar
      _get_pesos_legacy() que ignora flag. Tempo estimado: 15min.
      Follow-up story ou fix in-place antes do PR merge.
    blocking: false

  - id: C3
    severity: low
    category: code
    title: "Multiple is_state_of_art_enabled() calls per aggregation"
    description: |
      aggregate_metrics() chama is_state_of_art_enabled() 3x (linhas 203, 306
      + via _get_pesos e _active_scoring_dims). Valor poderia driftar se env
      var mudasse mid-execution (cenário patológico, mas reduz determinismo).
    impact: Mínimo. Função em memória lê env var a cada call — consistente em prática.
    recommendation: |
      Snapshot único no início da função (state_of_art = is_state_of_art_enabled())
      e passar por parâmetro para helpers. Refactor trivial.
    blocking: false

  - id: C4
    severity: low
    category: frontend
    title: "report/[id]/[dimension]/page.tsx banner secondary deferred"
    description: |
      Task 5 mencionou banner "análise complementar" na página de dimensão
      individual, mas foi marcado DEFERRED (story file). Usuário vê legend
      + badges no index mas não vê contextualização na drill-down page.
    impact: "UX gap menor — não bloqueia funcionalidade."
    recommendation: |
      Follow-up PR minor: adicionar SECONDARY_DIMENSION_BANNER no topo da
      [dimension]/page.tsx quando dimension in SECONDARY_DIMENSIONS.
    blocking: false

  - id: C5
    severity: low
    category: process
    title: "CodeRabbit full review não executado no QA gate"
    description: |
      CLI WSL disponível mas execução real requer 7-30min + auth válida.
      Não executado neste gate para manter flow de review. Recomendação é
      @devops rodar antes do PR merge como parte do push workflow.
    impact: "Baixo — análise manual cobriu áreas de risco prioritárias."
    recommendation: |
      @devops executar antes de abrir PR:
        wsl bash -c 'cd /mnt/c/.../oratoria-avaliador && ~/.local/bin/coderabbit --prompt-only --base main'
      Se CRITICAL/HIGH → return to @dev via qa-fix-issues.
    blocking: false

