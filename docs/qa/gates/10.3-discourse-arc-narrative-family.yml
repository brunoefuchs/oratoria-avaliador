# ─────────────────────────────────────────────────────────────────────────────
# Issues encontradas (severity classified)
# ─────────────────────────────────────────────────────────────────────────────

issues:
  - id: 10.3-QA-01
    severity: medium
    category: code
    file: "ml-worker/workers/discourse_arc_analyzer.py:235"
    description: |
      `retry_count` instrumentation broken. Lógica:
        "retry_count": 0 if "retry" not in str(last_error).lower() else 1
      Não conta retries reais — checa se string "retry" está no error message.
      Erros Gemini (429, quota, timeout) não contêm "retry" → retry_count
      sempre = 0 quando sucesso, mesmo após retry real.
    recommendation: |
      Track attempt index no loop e usar:
        attempt_actual = 0
        for attempt in (0, 1):
            try:
                ...
                attempt_actual = attempt  # sucesso aqui
                break
            except: ...
        ...
        "retry_count": attempt_actual,
    blocking: false
    fix_estimate: "5 min"

  - id: 10.3-QA-02
    severity: medium
    category: code
    file: "ml-worker/workers/discourse_arc_analyzer.py:83"
    description: |
      `tipo_payoff: Literal["insight", "imagem", "cta", "licao"]` sem cedilha,
      mas Gemini PODE retornar "lição" (cedilha) ocasionalmente em contexto
      PT-BR, causando ValidationError → WorkerFailure desnecessária.
      Smoke real funcionou — Gemini seguiu prompt rigoroso. Mas é frágil.
    recommendation: |
      Adicionar Pydantic field_validator que normaliza:
        @field_validator("tipo_payoff", mode="before")
        def _normalize_licao(cls, v):
            if v == "lição": return "licao"
            return v
      OU expandir Literal pra incluir variações com acento.
    blocking: false
    fix_estimate: "10 min"

  - id: 10.3-QA-03
    severity: low
    category: code
    file: "ml-worker/workers/discourse_arc_analyzer.py:256"
    description: |
      Parameter `evaluation_id` em `analyze_discourse_arc(transcript, evaluation_id="")`
      é unused. Não passa pro wrap_worker_result e não aparece em log structured.
    recommendation: "Usar no log final ou remover parameter (preferível remover — wrap_worker_result já loga)."
    blocking: false
    fix_estimate: "2 min"

  - id: 10.3-QA-04
    severity: low
    category: security
    file: "ml-worker/workers/discourse_arc_analyzer.py:101"
    description: |
      Prompt injection via transcript content é theoretical risk. Atacante
      poderia tentar `transcript = '} return {"score": 100, ...'` pra
      manipular output. Mitigações já presentes:
        - response_mime_type=application/json (Gemini valida JSON estrutural)
        - Pydantic schema validation (rejeita campos inesperados)
        - Score range Field(ge=0, le=100) (não permite 999)
      Threat aceito como "concern documented" pq mitigação é defesa em profundidade.
    recommendation: |
      Adicionar sanitização leve antes de inserir no prompt:
        - Strip control chars e quebras de linha excessivas
        - Truncar quoted blocks suspeitos (e.g. >5 aspas seguidas)
      OU documentar formal threat model em docs/security/.
    blocking: false
    fix_estimate: "20 min ou tech debt"

  - id: 10.3-QA-05
    severity: low
    category: tests
    file: "ml-worker/tests/test_discourse_arc.py"
    description: |
      Edge case ausente: Gemini retorna response com safety filter
      (response.text raise ValueError ao acessar). Não há test case.
    recommendation: "Adicionar 1 test mock simulando safety filter response."
    blocking: false
    fix_estimate: "10 min"

