rejected_paths:
  - option: "A. Expandir gui/vinh agents para cobrir governança"
    reason: "Violaria single responsibility; agents são mentor DNA puros"
  - option: "B. Squad puramente técnico (sem mentor)"
    reason: "Perde diferencial; contradiz feedback mentor 'falta camada humana'"
  - option: "D. Terceirizar gate ao mentor humano"
    reason: "Não escala; contradiz tese de produto"
  - option: "E. Pipeline serverless event-driven"
    reason: "Rewrite fora de escopo v1; incremental primeiro"

open_questions:
  - "Tese '+10% comunicação = +10% lucro' tem referência externa defensável?"
  - "B2B prioridade antes ou depois de 100 B2C estáveis?"
  - "Mentor humano no loop = Bruno ou externo?"
  - "Periodicidade de smoke test Voice DNA em produção?"
  - "Plug-and-play de novos mentores ou cada mentor = Epic?"

